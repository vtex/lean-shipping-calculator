# SonarQube Configuration for lean-shipping-calculator
#
# AUTHENTICATION:
# Token and host URL are loaded from .env.local (not committed to git)
# Copy .env.local.example to .env.local and configure your credentials
#
# USAGE:
#   yarn sonar:local   # Run coverage + SonarQube analysis
#   yarn quality       # Full quality check: lint + coverage + sonar

sonar.projectKey=lean-shipping-calculator
sonar.projectName=Lean Shipping Calculator
sonar.projectVersion=0.2.21

# Source configuration
sonar.sources=react
sonar.tests=react/__tests__
sonar.sourceEncoding=UTF-8

# JavaScript/TypeScript settings
sonar.javascript.lcov.reportPaths=react/coverage/lcov.info
sonar.typescript.lcov.reportPaths=react/coverage/lcov.info

# Exclusions
sonar.exclusions=**/node_modules/**,**/lib/**,**/coverage/**,**/__tests__/**,**/__mocks__/**,**/*.config.js,**/.babelrc*,**/fixtures/**,.husky/**,.specify/**,.claude/**,.cursor/**,.agents/**,specs/**,scripts/**

# Coverage exclusions
sonar.coverage.exclusions=**/__tests__/**,**/__mocks__/**,**/fixtures/**,**/*.test.js,**/*.spec.js,**/lib/**

# Quality gate thresholds (reference)
# - Coverage: 80% minimum
# - Duplications: 3% maximum
# - Maintainability Rating: A
# - Reliability Rating: A
# - Security Rating: A
