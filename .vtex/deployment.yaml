- name: lean-shipping-calculator
  referenceId: 1U64087V
  description: SonarQube scan for lean-shipping-calculator
  build:
    provider: dkcicd
    pipelines:
      - name: node-ci-v2
        parameters:
          nodeCommands:
            - "install --frozen-lockfile"
            - "--cwd react install --frozen-lockfile"
            - "run test:coverage"
          sonarProjectName: lean-shipping-calculator
          nodeVersion: 20-bookworm
        runtime:
          architecture: amd64
        when:
          - event: pull_request
            source: branch
          - event: push
            source: branch
            regex: main
