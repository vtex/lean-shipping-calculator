- name: lean-shipping-calculator
  referenceId: PLACEHOLDER
  description: SonarQube scan for lean-shipping-calculator
  build:
    provider: dkcicd
    pipelines:
      - name: node-ci-v2
        parameters:
          sonarProjectName: lean-shipping-calculator
          nodeVersion: 20-bookworm
        runtime:
          architecture: amd64
        when:
          - event: pull_request
            source: branch
          - event: push
            source: branch
            regex: main
